name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  offline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run offline tests
        run: python tests/test_offline.py

      - name: Run live API tests (expect skip without key)
        run: python tests/test_live_api.py
        env:
          GEMINI_API_KEY: ""
